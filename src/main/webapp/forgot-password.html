<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Red404</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/auth.js" defer></script>
</head>
<body class="auth-page">

<div class="auth-box">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🩸 Red404</div>
      <p style="color:var(--gray-500);font-size:0.9rem;">Reset your account password</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchType('donor')">Donor</button>
      <button class="auth-tab" onclick="switchType('hospital')">Hospital</button>
    </div>

    <div id="alert-box"></div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label>Registered Email Address</label>
        <input type="email" id="reset-email" class="form-control" placeholder="your-email@example.com" required/>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="reset-password" class="form-control" placeholder="Min 8 characters" minlength="8" required/>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="reset-confirm" class="form-control" placeholder="Re-enter new password" required/>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="reset-btn">
        Reset Password
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--gray-500);">
      Remembered your password?
      <a href="login.html">Sign in here</a>
    </div>
  </div>
</div>

<script>
  let currentType = 'donor';

  // Toggle between Donor and Hospital tabs
  function switchType(type) {
    currentType = type;
    document.querySelectorAll('.auth-tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0 && type === 'donor') || (i === 1 && type === 'hospital'))
    );
    
    // UI layout adaptations matching the selected role
    const btn = document.getElementById('reset-btn');
    if (type === 'hospital') {
      btn.className = 'btn btn-secondary';
    } else {
      btn.className = 'btn btn-primary';
    }
    document.getElementById('alert-box').innerHTML = '';
  }

  async function handleReset(e) {
    e.preventDefault();
    
    const email    = document.getElementById('reset-email').value.trim();
    const password = document.getElementById('reset-password').value;
    const confirm  = document.getElementById('reset-confirm').value;

    // Frontend Validations using auth.js helpers
    if (!Validate.email(email)) {
      showAlert('alert-box', 'Please enter a valid email address.', 'error');
      return;
    }
    if (!Validate.passwordsMatch(password, confirm)) {
      showAlert('alert-box', 'Passwords do not match.', 'error');
      return;
    }

    setButtonLoading('reset-btn', true, 'Reset Password');
    
    try {
      // Direct pass to the dynamic auth endpoint
      const { ok, data } = await API.post(`/api/auth/${currentType}/forgot-password`, { email, password });
      
      if (ok) {
        showAlert('alert-box', 'Password reset successfully! Redirecting to login...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        showAlert('alert-box', data.error || 'Failed to reset password. Email not found.', 'error');
      }
    } catch(err) {
      showAlert('alert-box', 'Network error. Please try again later.', 'error');
    } finally {
      setButtonLoading('reset-btn', false, 'Reset Password');
    }
  }
</script>
</body>
</html>
