<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Red404</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/auth.js" defer></script>
</head>
<body class="auth-page">

<div class="auth-box">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🩸 Red404</div>
      <p style="color:var(--gray-500);font-size:0.9rem;">Sign in to your account</p>
    </div>

    <!-- Type Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchType('donor')">Donor</button>
      <button class="auth-tab" onclick="switchType('hospital')">Hospital</button>
    </div>

    <div id="alert-box"></div>

    <!-- Donor Login Form -->
    <form id="donor-form" onsubmit="login(event,'donor')">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="d-email" class="form-control" placeholder="donor@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="d-password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="d-btn">
        Sign In as Donor
      </button>
    </form>

    <!-- Hospital Login Form -->
    <form id="hospital-form" style="display:none;" onsubmit="login(event,'hospital')">
      <div class="form-group">
        <label>Hospital Email</label>
        <input type="email" id="h-email" class="form-control" placeholder="hospital@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="h-password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-secondary" style="width:100%;justify-content:center;" id="h-btn">
        Sign In as Hospital
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--gray-500);">
      Don't have an account?
      <a href="register-donor.html" id="reg-link">Register here</a>
    </div>
    <div style="text-align:center;margin-top:.5rem;">
      <a href="index.html" style="font-size:0.85rem;color:var(--gray-500);">← Back to Home</a>
    </div>
  </div>
</div>

<script>
  let currentType = 'donor';

  function switchType(type) {
    currentType = type;
    document.getElementById('donor-form').style.display    = type === 'donor'    ? '' : 'none';
    document.getElementById('hospital-form').style.display = type === 'hospital' ? '' : 'none';
    document.querySelectorAll('.auth-tab').forEach((t,i) =>
      t.classList.toggle('active', (i===0 && type==='donor') || (i===1 && type==='hospital'))
    );
    document.getElementById('reg-link').href = type === 'donor' ? 'register-donor.html' : 'register-hospital.html';
    document.getElementById('alert-box').innerHTML = '';
  }

  async function login(e, type) {
    e.preventDefault();
    const email    = document.getElementById(type==='donor' ? 'd-email'    : 'h-email').value;
    const password = document.getElementById(type==='donor' ? 'd-password' : 'h-password').value;
    const btnId    = type === 'donor' ? 'd-btn' : 'h-btn';
    const btnText  = type === 'donor' ? 'Sign In as Donor' : 'Sign In as Hospital';

    // Validate fields using auth.js Validate helper
    if (!Validate.email(email)) {
      showAlert('alert-box', 'Please enter a valid email address.', 'error'); return;
    }
    if (!email || !password) {
      showAlert('alert-box', 'Email and password are required.', 'error'); return;
    }

    setButtonLoading(btnId, true, btnText);
    try {
      const { ok, data } = await API.post(`/api/auth/${type}/login`, { email, password });
      if (ok) {
        Auth.saveSession(data);
        window.location.href = type === 'donor' ? 'donor-dashboard.html' : 'hospital-dashboard.html';
      } else {
        showAlert('alert-box', data.error || 'Invalid credentials. Please try again.', 'error');
      }
    } catch(err) {
      showAlert('alert-box', 'Network error. Please try again.', 'error');
    } finally {
      setButtonLoading(btnId, false, btnText);
    }
  }
</script>
</body>
</html>
