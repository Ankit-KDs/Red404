<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donor Registration — Red404</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/auth.js" defer></script>
</head>
<body class="auth-page" style="align-items:flex-start;padding:2rem 0;">

<div class="auth-box" style="max-width:600px;">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🩸 Red404</div>
      <h2 style="font-size:1.3rem;">Register as Blood Donor</h2>
      <p style="color:var(--gray-500);font-size:0.88rem;">Join the lifesaving network</p>
    </div>

    <div id="alert-box"></div>

    <form id="reg-form" onsubmit="register(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" class="form-control" placeholder="Your full name" required/>
        </div>
        <div class="form-group">
          <label>Age *</label>
          <input type="number" id="age" class="form-control" placeholder="18–65" min="18" max="65" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date" id="dob" class="form-control" required/>
        </div>
        <div class="form-group">
          <label>Blood Group *</label>
          <select id="bloodGroup" class="form-control" required>
            <option value="">Select</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
            <option>O+</option><option>O-</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="phone" class="form-control" placeholder="10-digit mobile" pattern="[0-9]{10}" required/>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Address *</label>
        <input type="text" id="address" class="form-control" placeholder="City, State" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Latitude (your location)</label>
          <input type="number" id="lat" class="form-control" step="any" placeholder="e.g. 27.8974" readonly/>
        </div>
        <div class="form-group">
          <label>Longitude (your location)</label>
          <input type="number" id="lon" class="form-control" step="any" placeholder="e.g. 78.0880" readonly/>
        </div>
      </div>
      <button type="button" class="btn btn-outline btn-sm" onclick="getLocation()" style="margin-bottom:1rem;">
        📍 Auto-detect My Location
      </button>
      <div class="form-row">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="password" class="form-control" placeholder="Min 8 characters" minlength="8" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" id="confirm" class="form-control" placeholder="Re-enter password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;" id="reg-btn">
        Create Donor Account
      </button>
    </form>

    <div style="text-align:center;margin-top:1.2rem;font-size:0.88rem;color:var(--gray-500);">
      Already registered? <a href="login.html">Sign in here</a>
    </div>
  </div>
</div>

<script>
  function getLocation() {
    const btn = event.target;
    detectLocation('lat', 'lon', btn);  // auth.js helper
  }

  async function register(e) {
    e.preventDefault();

    const fields = {
      name:        document.getElementById('name').value.trim(),
      age:         parseInt(document.getElementById('age').value),
      dob:         document.getElementById('dob').value,
      bloodGroup:  document.getElementById('bloodGroup').value,
      phone:       document.getElementById('phone').value.trim(),
      email:       document.getElementById('email').value.trim(),
      address:     document.getElementById('address').value.trim(),
      password:    document.getElementById('password').value,
      confirm:     document.getElementById('confirm').value
    };

    // Validate using auth.js Validate helper
    const errors = Validate.donorForm(fields);
    if (errors.length > 0) {
      showAlert('alert-box', errors[0], 'error'); return;
    }

    setButtonLoading('reg-btn', true, 'Create Donor Account');

    const payload = {
      name:       fields.name,
      age:        fields.age,
      dob:        fields.dob,
      bloodGroup: fields.bloodGroup,
      phone:      fields.phone,
      email:      fields.email,
      address:    fields.address,
      password:   fields.password,
      latitude:   parseFloat(document.getElementById('lat').value)  || 0,
      longitude:  parseFloat(document.getElementById('lon').value) || 0
    };

    try {
      const { ok, data } = await API.post('/api/auth/donor/register', payload);
      if (ok) {
        Auth.saveSession(data);
        window.location.href = 'donor-dashboard.html';
      } else {
        showAlert('alert-box', data.error || 'Registration failed. Please try again.', 'error');
      }
    } catch(err) {
      showAlert('alert-box', 'Network error. Please check your connection.', 'error');
    } finally {
      setButtonLoading('reg-btn', false, 'Create Donor Account');
    }
  }
</script>
</body>
</html>
